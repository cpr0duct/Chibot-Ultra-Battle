<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Auto-detect base path for proxy support (/chub/ or /)
    (function() {
      var path = window.location.pathname;
      var base = '/';
      var match = path.match(/^(\/chub\/)/);
      if (match) base = match[1];
      document.write('<base href="' + base + '">');
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChUB 2000 — Chibot Ultra Battle</title>
  <link rel="stylesheet" href="css/chub.css?v=0.7.0">
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" title="Toggle theme">L</button>

  <div class="landing">
    <img src="img/logo.png" alt="ChUB 2000" class="logo-img">
    <div class="subtitle">CHIBOT ULTRA BATTLE</div>
    <div class="tagline">The arena awaits...</div>

    <div class="entry-form">
      <input type="text" id="screen-name" placeholder="Enter your name..." maxlength="20" autocomplete="off">
      <button class="btn btn-primary" id="enter-lobby">ENTER THE ARENA</button>
    </div>

    <div class="links">
      <a href="editors/character.html">Character Editor</a>
      <span style="color:var(--text-muted);">|</span>
      <a href="editors/arena.html">Arena Editor</a>
    </div>
  </div>

  <script src="socket.io/socket.io.js"></script>
  <script src="js/theme.js?v=0.7.0"></script>
  <script src="js/socket-client.js?v=0.7.0"></script>
  <script>
    (function () {
      var nameInput = document.getElementById('screen-name');
      var enterBtn = document.getElementById('enter-lobby');

      // Restore previously-entered name
      var stored = ChubSocket.getScreenName();
      if (stored) nameInput.value = stored;

      function enterLobby() {
        var name = nameInput.value.trim();
        if (!name) {
          nameInput.focus();
          nameInput.style.borderColor = 'var(--accent-red)';
          nameInput.style.boxShadow = '0 0 10px rgba(255,51,102,0.3)';
          return;
        }
        ChubSocket.setScreenName(name);
        window.location.href = 'lobby.html';
      }

      enterBtn.addEventListener('click', enterLobby);
      nameInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') enterLobby();
        nameInput.style.borderColor = '';
        nameInput.style.boxShadow = '';
      });

      nameInput.focus();
    })();
  </script>
</body>
</html>
